
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 8px;
            background-color: #ffffff;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        table.custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            text-align: center;
            white-space: nowrap;
        }
        table.custom-table th {
            background-color: #1e293b;
            text-align: center;
            color: #ffffff;
            padding: 12px 10px;
            font-weight: 600;
        }
        table.custom-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #0f172a;
            font-weight: 500;
        }
        table.custom-table td:first-child {
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
            color: #0f172a;
        }
        table.custom-table tr:hover { background-color: #f8fafc; }
        .chart-btn {
            background-color: #2563eb;
            color: #ffffff !important;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.2s ease;
        }
        .chart-btn:hover { background-color: #1d4ed8; }
        @media screen and (max-width: 600px) {
            table.custom-table { font-size: 13px; }
            table.custom-table th, table.custom-table td { padding: 8px 6px; }
            .chart-btn { padding: 4px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="table-container">
        <p style='text-align:center; padding:20px; font-weight:bold;'>No stock has appeared in the filter yet.</p>
    </div>
</body>
</html>
