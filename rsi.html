
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 8px;
            background-color: #ffffff;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        table.custom-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 18px;
            text-align: center;
            white-space: nowrap;
        }
        table.custom-table th {
            background-color: #2a3952;
            text-align: center;
            color: #ffffff;
            padding: 12px 10px;
            font-weight: 600;
        }
        table.custom-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #0f172a;
            font-weight: 500;
        }
        table.custom-table td:first-child {
            font-weight: bold;
            color: #1e293b;
        }
        table.custom-table tr:hover { background-color: #f8fafc; }
        .chart-btn {
            background-color: #2563eb;
            color: #ffffff !important;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.2s ease;
        }
        .chart-btn:hover { background-color: #1d4ed8; }
        @media screen and (max-width: 600px) {
            table.custom-table { font-size: 16px; }
            table.custom-table th, table.custom-table td { padding: 8px 8px; }
            .chart-btn { padding: 5px 8px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="table-container">
        <table border="1" class="dataframe custom-table">
  <thead>
    <tr style="text-align: right;">
      <th>Symbol</th>
      <th>Close</th>
      <th>Volume</th>
      <th>Chart</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>APOLLO</td>
      <td>404.90</td>
      <td>13,696,045</td>
      <td><a href="https://in.tradingview.com/chart/?symbol=NSE:APOLLO&interval=D" target="_blank" class="chart-btn">📈 Chart</a></td>
    </tr>
  </tbody>
</table>
    </div>
</body>
</html>
