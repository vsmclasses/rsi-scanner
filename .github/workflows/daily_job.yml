name: Daily Auto Execution

on:
  schedule:
    # 5:00 PM IST = 11:30 AM UTC
    - cron: '30 11 * * *'
  workflow_dispatch: # Iss option se aap manually bhi run kar sakte hain

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: |
          python main.py  # <-- Apni main python file ka naam yahan likhein
