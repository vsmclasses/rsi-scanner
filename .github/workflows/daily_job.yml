name: Daily Auto Execution (5 PM IST)

on:
  schedule:
    # 30 11 * * * ka matlab UTC 11:30 AM = India Time (IST) 5:00 PM
    - cron: '30 11 * * *'
  workflow_dispatch: # Iss button se aap jab chahein manually bhi run kar sakte hain

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: |
          python main.py  # <-- Agar aapki file ka naam alag hai (jaise app.py), toh yahan badal lein
