name: Chartink Auto Scanner

on:
  schedule:
    # IST: सुबह 9:00 AM से शाम 5:00 PM तक हर 1 घंटे (Exact hour) में रन होगा
    - cron: '30 3-11 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies & Chromium Browser
        run: |
          pip install playwright pandas beautifulsoup4
          playwright install chromium

      - name: Fetch Chartink Results via Playwright
        run: python chartink_scraper.py

      - name: Push to Repo
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add rsi.html
          git commit -m "Auto-update Chartink live scan" || exit 0
          git push
